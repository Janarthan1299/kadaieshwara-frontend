<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <!-- Lord Shiva Silhouette -->
  <defs>
    <linearGradient id="shivaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d4a6f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="55" r="45" fill="none" stroke="url(#shivaGradient)" stroke-width="2"/>
  
  <!-- Simplified Shiva Figure -->
  <!-- Head -->
  <ellipse cx="50" cy="30" rx="12" ry="14" fill="url(#shivaGradient)"/>
  
  <!-- Third Eye -->
  <ellipse cx="50" cy="26" rx="2" ry="1.5" fill="#d4a574"/>
  
  <!-- Hair/Jata -->
  <path d="M38 20 Q35 10, 45 15 Q50 5, 55 15 Q65 10, 62 20" stroke="url(#shivaGradient)" fill="none" stroke-width="3"/>
  
  <!-- Crescent Moon -->
  <path d="M58 12 Q65 15, 60 22 Q55 18, 58 12" fill="#d4a574"/>
  
  <!-- Body -->
  <path d="M42 42 L38 80 L45 80 L50 55 L55 80 L62 80 L58 42 Z" fill="url(#shivaGradient)"/>
  
  <!-- Arms in meditation pose -->
  <path d="M38 50 Q25 55, 30 70 Q35 75, 43 65" stroke="url(#shivaGradient)" fill="none" stroke-width="3"/>
  <path d="M62 50 Q75 55, 70 70 Q65 75, 57 65" stroke="url(#shivaGradient)" fill="none" stroke-width="3"/>
  
  <!-- Lotus base -->
  <ellipse cx="50" cy="85" rx="25" ry="8" fill="none" stroke="#d4a574" stroke-width="2"/>
  
  <!-- Trishul behind -->
  <line x1="50" y1="5" x2="50" y2="25" stroke="#d4a574" stroke-width="2"/>
  <path d="M44 8 L50 2 L56 8" stroke="#d4a574" fill="none" stroke-width="2"/>
  <line x1="45" y1="8" x2="45" y2="12" stroke="#d4a574" stroke-width="2"/>
  <line x1="55" y1="8" x2="55" y2="12" stroke="#d4a574" stroke-width="2"/>
  
  <!-- Om symbol below -->
  <text x="50" y="105" text-anchor="middle" font-size="14" fill="url(#shivaGradient)" font-family="serif">ॐ</text>
</svg>